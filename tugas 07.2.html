<!DOCTYPE html>
<html>
<head>
    <title>Konversi Nilai Huruf</title>
</head>

<body>

<script>

var nilai;

nilai = prompt("Masukkan nilai (0-100):");

if (nilai >= 0 && nilai <= 20)
{
    document.write("Nilai Huruf : E");
}
else if (nilai >= 21 && nilai <= 39)
{
    document.write("Nilai Huruf : D");
}
else if (nilai >= 40 && nilai <= 64)
{
    document.write("Nilai Huruf : C");
}
else if (nilai >= 65 && nilai <= 79)
{
    document.write("Nilai Huruf : B");
}
else if (nilai >= 80 && nilai <= 100)
{
    document.write("Nilai Huruf : A");
}
else
{
    document.write("Input tidak valid");
}

</script>

</body>
</html>
